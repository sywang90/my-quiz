<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>罗氏MCE大力神杯竞赛</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        /* 🎨 罗氏官方蓝白 x 荣耀金电竞风 */
        :root {
            --roche-blue: #0066CC;       /* 罗氏经典蓝 */
            --roche-dark: #002244;       /* 深海商务蓝 */
            --roche-light: #F4F8FC;      /* 纯净科技白 bg */
            --cyan-glow: #00F0FF;        /* 炫酷荧光蓝 */
            --gold-winner: #FFD700;      /* 大力神杯荣耀金 */
            --panel-bg: rgba(0, 34, 68, 0.85);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at center, var(--roche-dark) 0%, #000b18 100%); 
            color: #fff; 
            text-align: center; 
            margin: 0; 
            padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom) 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .container { max-width: 850px; margin: 0 auto; width: 100%; position: relative; z-index: 2; }
        
        /* 🏆 顶部罗氏MCE大力神杯布局（含奖杯） */
        .header-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 5px;
        }

        /* 炫酷黄金奖杯图标 CSS 拟真绘制 */
        .trophy-icon {
            width: 45px;
            height: 55px;
            background: linear-gradient(45deg, #FFD700, #FFA500, #FFFACD, #FFD700);
            clip-path: polygon(20% 0%, 80% 0%, 90% 20%, 70% 50%, 80% 85%, 50% 100%, 20% 85%, 30% 50%, 10% 20%);
            filter: drop-shadow(0 0 12px rgba(255, 215, 0, 0.8));
            animation: trophy-glow 1.5s infinite alternate;
            flex-shrink: 0;
        }

        h1 { 
            font-size: 1.9rem; 
            font-weight: 900;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #FFF 30%, var(--cyan-glow) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            text-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
            text-align: left;
        }

        /* 📍 副标题：请参赛者们入场签到 */
        .sub-title {
            font-size: 1.2rem;
            color: var(--cyan-glow);
            font-weight: bold;
            letter-spacing: 2px;
            margin-top: 5px;
            margin-bottom: 25px;
            text-shadow: 0 0 8px rgba(0, 240, 255, 0.6);
            animation: pulse-text 2s infinite;
        }

        /* 🏆 结果公告栏 */
        #resultView { 
            font-size: 1.4rem; 
            color: #fff; 
            font-weight: bold; 
            margin: 15px auto; 
            padding: 12px 20px;
            background: rgba(0, 102, 204, 0.2);
            border-radius: 16px;
            border: 1px solid rgba(0, 240, 255, 0.3);
            min-height: 55px; 
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0, 102, 204, 0.2);
        }

        /* 📱 登录面板 */
        .glass-panel {
            background: var(--panel-bg);
            border: 2px solid rgba(0, 102, 204, 0.4);
            border-radius: 24px;
            padding: 35px 25px;
            box-shadow: 0 15px 35px rgba(0, 102, 204, 0.3);
            backdrop-filter: blur(20px);
        }

        input { 
            padding: 16px 20px; 
            font-size: 1.1rem; 
            border-radius: 14px; 
            border: 2px solid rgba(0, 102, 204, 0.3); 
            width: 100%; 
            max-width: 320px; 
            text-align: center; 
            background: rgba(0, 0, 0, 0.5); 
            color: #fff; 
            outline: none; 
            transition: 0.3s;
            margin-bottom: 25px;
        }
        input:focus { 
            border-color: var(--cyan-glow); 
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.5);
        }

        .action-btn { 
            background: linear-gradient(135deg, var(--roche-blue) 0%, #004499 100%); 
            color: white; 
            border: 1px solid var(--cyan-glow);
            padding: 16px 40px; 
            font-size: 1.2rem; 
            font-weight: bold;
            border-radius: 14px; 
            cursor: pointer; 
            transition: 0.2s; 
            box-shadow: 0 6px 20px rgba(0, 102, 204, 0.4);
            width: 100%;
            max-width: 320px;
            letter-spacing: 1px;
        }
        .action-btn:active { transform: scale(0.96); box-shadow: 0 2px 10px rgba(0, 102, 204, 0.2); }

        /* 🚨 状态提示条 */
        #statusText { 
            font-size: 1.1rem; 
            font-weight: bold; 
            padding: 12px; 
            border-radius: 12px; 
            margin: 15px auto;
            max-width: 340px;
        }
        .status-lock { color: #aaa; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
        .status-go { color: var(--gold-winner); background: rgba(255, 215, 0, 0.1); border: 1px solid rgba(255, 215, 0, 0.4); animation: breath 1s infinite alternate; }

        /* 🔘 罗氏精英抢答键 */
        #rushButton { 
            width: 230px; 
            height: 230px; 
            border-radius: 50%; 
            font-size: 2.2rem; 
            font-weight: 900;
            background: radial-gradient(circle at center, #112244 0%, #001122 100%); 
            color: rgba(255,255,255,0.2); 
            box-shadow: 0 10px 0 #000818, inset 0 4px 10px rgba(255,255,255,0.05); 
            margin: 35px auto; 
            display: flex;
            align-items: center;
            justify-content: center;
            border: 6px solid #1a3366; 
            transition: all 0.12s ease-out; 
            cursor: not-allowed;
        }
        /* 激活状态：瞬间爆燃变金黄色（捧杯
