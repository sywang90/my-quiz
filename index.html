<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>⚡🏆  MCE 大力神杯系列赛 - 加入战队，竞速抢答！ 🏆⚡</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    
    <style>
        /* 🎨 全局电竞运动主题 */
        :root {
            --bg-color: #0a2f1d;
            --primary-color: #ff007f;
            --secondary-color: #00f0ff;
            --success-color: #39ff14;
            --warning-color: #ffaa00;
            --panel-bg: rgba(10, 35, 20, 0.75);
            --gold-color: #FFD700; 
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: "Microsoft YaHei", "微软雅黑", -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #1b4d22;
            background-image: 
                radial-gradient(circle at 50% 100%, rgba(255, 255, 255, 0.15) 0%, transparent 60%),
                radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.1) 0%, transparent 50%),
                repeating-linear-gradient(90deg, #143d1a 0px, #143d1a 60px, #1b4d22 60px, #1b4d22 120px);
            background-attachment: fixed;
            color: #fff; 
            text-align: center; 
            margin: 0; 
            padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom) 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow-x: hidden;
        }

        .container { max-width: 800px; margin: 0 auto; width: 100%; position: relative; z-index: 2; }
        
        .header-wrap {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
        }

        .top-event-title {
            font-family: "Microsoft YaHei", "微软雅黑", sans-serif;
            font-size: 2.8rem; 
            font-weight: bold; 
            color: var(--gold-color); 
            letter-spacing: 2px;
            margin: 0;
            padding: 0 15px;
            line-height: 1.2;
            text-transform: uppercase;
            animation: gold-glow-flicker 2s infinite alternate;
        }

        .cartoon-trophy {
            width: 70px;  
            height: 70px;
            filter: drop-shadow(0 0 12px rgba(255, 215, 0, 0.8));
            animation: trophy-bounce 1.5s infinite alternate ease-in-out;
            flex-shrink: 0;
            margin-bottom: 10px;
        }

        h1 { 
            font-size: 2.1rem; 
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-top: 15px;
            margin-bottom: 5px;
            filter: drop-shadow(0 2px 12px rgba(255,0,127,0.4));
            animation: neon-flicker 2s infinite alternate;
        }

        #resultView { 
            font-size: 1.5rem; 
            color: #fff; 
            font-weight: bold; 
            margin: 15px auto; 
            padding: 12px 20px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            min-height: 55px; 
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            position: relative;
        }

        #burstOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .burst-winner {
            font-family: "Microsoft YaHei", sans-serif;
            font-size: 3.5rem;
            font-weight: 900;
            color: #39ff14; 
            text-shadow: 0 0 20px rgba(57, 255, 20, 0.8), 0 0 40px rgba(57, 255, 20, 0.5);
            animation: winner-pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.5) forwards, winner-shaking 0.05s infinite;
            animation-duration: 0.4s, 3s; 
            animation-iteration-count: 1, 60; 
            animation-fill-mode: forwards;
            position: relative;
            z-index: 1010;
            padding: 0 20px;
        }

        .lucky-star {
            font-family: "Microsoft YaHei", sans-serif;
            font-size: 3.5rem;
            font-weight: 900;
            color: var(--gold-color);
            text-shadow: 0 0 25px rgba(255, 215, 0, 0.9), 0 0 50px rgba(255, 215, 0, 0.6);
            animation: winner-pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.4) forwards, lucky-glow 0.3s infinite alternate;
            position: relative;
            z-index: 1010;
            padding: 0 20px;
        }

        .smoke-cloud {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 20px; height: 20px;
            background: transparent;
            border-radius: 50%;
            pointer-events: none;
            box-shadow: 
                0 0 80px 40px rgba(255, 0, 127, 0.85), 
                0 0 120px 70px rgba(0, 240, 255, 0.75), 
                -50px -40px 100px 50px rgba(57, 255, 20, 0.7),
                50px 40px 100px 50px rgba(255, 215, 0, 0.7);
            animation: smoke-burst-disperse 1.2s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
            z-index: 1005;
        }

        .glass-panel {
            background: var(--panel-bg);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            padding: 35px 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(20px);
        }

        input, select { 
            padding: 16px 20px; 
            font-size: 1.1rem; 
            border-radius: 16px; 
            border: 2px solid rgba(255, 255, 255, 0.2); 
            width: 100%; 
            max-width: 320px; 
            text-align: center; 
            text-align-last: center; /* 让select文字也居中 */
            background: rgba(0, 0, 0, 0.6); 
            color: #fff; 
            outline: none; 
            transition: 0.3s;
            margin-bottom: 20px;
        }
        input:focus, select:focus { 
            border-color: var(--secondary-color); 
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.5);
        }
        select option { background: #143d1a; color: #fff; } /* 适配手机选择框下拉背景 */

        .action-btn { 
            background: linear-gradient(135deg, var(--primary-color) 0%, #b0005d 100%); 
            color: white; 
            border: none; 
            padding: 16px 40px; 
            font-size: 1.2rem; 
            font-weight: bold;
            border-radius: 16px; 
            cursor: pointer; 
            transition: 0.2s; 
            box-shadow: 0 6px 20px rgba(255, 0, 127, 0.4);
            width: 100%;
            max-width: 320px;
        }

        #statusText { 
            font-size: 1.1rem; 
            font-weight: bold; 
            padding: 12px; 
            border-radius: 12px; 
            margin: 15px auto;
            max-width: 340px;
            transition: 0.3s;
        }
        .status-lock { color: var(--warning-color); background: rgba(255, 170, 0, 0.2); border: 1px solid rgba(255, 170, 0, 0.3); }
        .status-go { color: var(--success-color); background: rgba(57, 255, 20, 0.2); border: 1px solid rgba(57, 255, 20, 0.4); animation: breath 1s infinite alternate; }

        #rushButton { 
            width: 240px; 
            height: 240px; 
            border-radius: 50%; 
            font-size: 2.2rem; 
            font-weight: 950;
            background: 
                radial-gradient(circle at center, rgba(255,255,255,0.15) 0%, rgba(0,0,0,0.5) 100%),
                #1a3d24;
            color: #668877; 
            box-shadow: 0 12px 0 #0d2616, inset 0 6px 15px rgba(255,255,255,0.1), 0 15px 25px rgba(0,0,0,0.6); 
            margin: 30px auto; 
            display: flex;
            align-items: center;
            justify-content: center;
            border: 8px solid #255433; 
            transition: all 0.12s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            cursor: not-allowed;
            position: relative;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }
        
        #rushButton.active { 
            background: 
                radial-gradient(circle at center, rgba(255,255,255,0.2) 0%, rgba(0,0,0,0.4) 100%),
                #ff2a6d; 
            color: white; 
            box-shadow: 0 12px 0 #5a001e, 0 0 50px rgba(255, 42, 109, 0.8); 
            border: 8px solid #ff6596; 
            cursor: pointer; 
            animation: pulse 0.6s infinite alternate, shake 0.08s infinite;
        }
        #rushButton:active:not(:disabled) {
            transform: translateY(10px);
            box-shadow: 0 2px 0 #5a001e, 0 0 25px rgba(255, 42, 109, 0.5);
        }

        #countdownOverlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(5, 20, 10, 0.98); 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            z-index: 999; 
        }
        #countdownNumber { 
            font-size: 15rem; font-weight: 900; 
            color: #ff003c; 
            text-shadow: 0 0 40px rgba(255, 0, 60, 0.6), 0 0 80px rgba(255, 0, 60, 0.4); 
            animation: popIn 0.5s ease-out infinite alternate; 
        }
        #countdownTips { font-size: 2rem; color: var(--gold-color); font-weight: bold; margin-bottom: 20px; letter-spacing: 4px; text-shadow: 0 0 12px rgba(255,215,0,0.4); }

        .dashboard { display: flex; justify-content: space-around; align-items: flex-start; margin-top: 10px; flex-wrap: wrap; gap: 20px; text-align: left; }
        .panel { background: rgba(0, 0, 0, 0.6); padding: 25px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); flex: 1; min-width: 300px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #qrcode { background: white; padding: 12px; display: inline-block; border-radius: 12px; margin-top: 10px; }
        .user-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px; max-height: 250px; overflow-y: auto; }
        .user-badge { background: rgba(255, 255, 255, 0.1); padding: 8px 16px; border-radius: 30px; border: 1px solid #fff; font-size: 0.95rem; }
        .admin-action-btn { background: linear-gradient(135deg, #00FF66 0%, #009933 100%); width: auto; max-width: none; border: none; font-size: 1.2rem; color: #001122; margin-bottom: 15px; }

        @keyframes gold-glow-flicker {
            0%, 100% { text-shadow: 0 0 12px rgba(255, 215, 0, 0.7), 0 0 24px rgba(255, 215, 0, 0.4); opacity: 1; }
            50% { text-shadow: 0 0 18px rgba(255, 215, 0, 0.9), 0 0 35px rgba(255, 215, 0, 0.6); opacity: 0.95; }
        }
        @keyframes trophy-bounce { 0% { transform: translateY(0) scale(1); } 100% { transform: translateY(-8px) scale(1.05); } }
        @keyframes pulse { 0% { box-shadow: 0 12px 0 #5a001e, 0 0 30px rgba(255, 42, 109, 0.5); } 100% { box-shadow: 0 12px 0 #5a001e, 0 0 60px rgba(255, 42, 109, 0.9); } }
        @keyframes breath { 0% { opacity: 0.6; } 100% { opacity: 1; } }
        @keyframes popIn { 0% { transform: scale(0.85); } 100% { transform: scale(1.05); } }
        @keyframes shake { 0% { transform: translate(0, 0); } 50% { transform: translate(-1px, 1px); } 100% { transform: translate(1px, -1px); } }
        @keyframes winner-pop { 0% { transform: scale(0.1); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes winner-shaking { 
            0%, 100% { transform: scale(1) translate(0, 0) rotate(0deg); } 
            20% { transform: scale(1) translate(-4px, 4px) rotate(-1.5deg); } 
            40% { transform: scale(1) translate(4px, -3px) rotate(1.5deg); }
            60% { transform: scale(1) translate(-3px, -2px) rotate(-1deg); }
            80% { transform: scale(1) translate(3px, 3px) rotate(1deg); }
        }
        @keyframes lucky-glow {
            0% { filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.6)); }
            100% { filter: drop-shadow(0 0 25px rgba(255, 215, 0, 1)); }
        }
        @keyframes smoke-burst-disperse {
            0% { box-shadow: 0 0 10px 10px rgba(255,0,127,0.9), 0 0 10px 10px rgba(0,240,255,0.9); opacity: 1; }
            100% { box-shadow: 0 0 18px 120px rgba(255,0,127,0), 0 0 250px 160px rgba(0,240,255,0); transform: translate(-50%, -50%) scale(4.5); opacity: 0; }
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="countdownOverlay" class="hidden">
        <div id="countdownTips">🏆 大力神杯系列赛 - 预备 🏆</div>
        <div id="countdownNumber">3</div>
    </div>

    <div id="burstOverlay" class="hidden"></div>

    <div class="container">
        
        <div class="header-wrap">
            <svg class="cartoon-trophy" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 16C12 10 18 8 18 8V24C18 24 12 22 12 16Z" fill="#FFB300" stroke="#FFD700" stroke-width="2"/>
                <path d="M52 16C52 10 46 8 46 8V24C46 24 52 22 52 16Z" fill="#FFB300" stroke="#FFD700" stroke-width="2"/>
                <path d="M16 8C16 8 18 36 32 36C46 36 48 8 48 8H16Z" fill="#FFD700"/>
                <path d="M26 36H38V48H26V36Z" fill="#FFB300"/>
                <path d="M20 48H44V56H20V48Z" fill="#8B5A2B"/>
                <circle cx="32" cy="20" r="6" fill="#FFF" opacity="0.3"/>
            </svg>
            <div class="top-event-title">MCE 大力神杯</div>
        </div>
        
        <h1 id="mainTitle">⚡ SPEED RUSH ⚡</h1>
        
        <div id="resultView">🏆 加入战队，竞速抢答！ </div>

        <div id="loginView" class="hidden glass-panel">
            <h2 style="color: var(--secondary-color); font-size: 1.5rem; margin-top: 0;">加入这场博弈</h2>
            
            <p style="color: #aaa; margin-bottom: 10px;">请输入您的个人昵称：</p>
            <input type="text" id="usernameInput" placeholder="例如：张三" autocomplete="off">
            
            <p style="color: #aaa; margin-bottom: 10px; margin-top: 10px;">请选择您所属的战队：</p>
            <select id="teamSelect">
                <option value="" disabled selected>-- 请选择您的战队 --</option>
                <option value="中区">中区</option>
                <option value="东区">东区</option>
                <option value="西南区">西南区</option>
                <option value="北二区">北二区</option>
                <option value="南区">南区</option>
                <option value="北一区">北一区</option>
                <option value="西北区">西北区</option>
            </select>
            <br>
            <button class="action-btn" onclick="register()" style="margin-top: 15px;">锁定身份 ➡️ 入场</button>
        </div>

        <div id="playerView" class="hidden">
            <p style="font-size: 1.1rem; color: #aaa; margin: 5px 0;">当前身份：<span id="myTitle" style="color:var(--secondary-color); font-weight: 900;"></span></p>
            <div id="statusText" class="status-lock">🔒 请听主持人宣读题目...</div>
            <button id="rushButton" disabled onclick="pressButton()">READY</button>
        </div>

        <div id="adminView" class="dashboard hidden">
            <div class="panel">
                <h3 style="color: var(--secondary-color); margin-top: 0; font-size: 1.2rem;">📢 赛事集结专属二维码</h3>
                <div id="qrcode"></div>
                <h4 style="margin-top: 20px; margin-bottom: 10px; color: #aaa;">已就位选手 (<span id="userCount" style="color:var(--gold-color); font-weight: bold;">0</span> 人)：</h4>
                <div class="user-list" id="userList"></div>
            </div>
            
            <div class="panel" style="display: flex; flex-direction: column; justify-content: center;">
                <h3 style="color: var(--gold-color); margin-top: 0; font-size: 1.2rem;">⚙️ MCE 赛事中控台</h3>
                <button id="adminStartBtn" class="action-btn admin-action-btn" onclick="startQuiz()">🔥 启动极速抢答（3秒倒计）</button>
                <button class="action-btn admin-action-btn" onclick="luckyDraw()">🎯 随机点将回答啦！ </button>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let myName = "";
        let isClientAdmin = false;
        let countdownTimer = null;

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            isClientAdmin = urlParams.get('role') === 'admin';

            if (isClientAdmin) {
                document.getElementById('adminView').classList.remove('hidden');
                document.getElementById('mainTitle').innerText = "SPEED RUSH";
                document.querySelector('.top-event-title').innerText = "💻 MCE COMMAND PANEL";
                if(document.querySelector('.cartoon-trophy')) document.querySelector('.cartoon-trophy').style.display = 'none';
                
                let staffUrl = window.location.origin + window.location.pathname;
                new QRCode(document.getElementById("qrcode"), {
                    text: staffUrl,
                    width: 180,
                    height: 180,
                    colorDark : "#000000",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.H
                });
            } else {
                document.getElementById('loginView').classList.remove('hidden');
                document.getElementById('adminView').remove(); 
            }
        };

        function register() {
            const nickname = document.getElementById('usernameInput').value.trim();
            const team = document.getElementById('teamSelect').value;
            
            // 🚀 核心验证逻辑：昵称不能为空，且必须选择战队
            if (!nickname) return alert('代号不能为空，请输入您的昵称！');
            if (!team) return alert('请选择您所属的战队！');
            
            // 将战队名和昵称融合在一起，作为系统的最终通信身份
            myName = `【${team}】${nickname}`;
            socket.emit('register', myName);
        }

        function pressButton() { 
            if (!myName) {
                myName = document.getElementById('myTitle').innerText.trim();
            }
            socket.emit('pressButton', myName); 
        }

        socket.on('registered', (name) => {
            document.getElementById('loginView').classList.add('hidden');
            document.getElementById('playerView').classList.remove('hidden');
            document.getElementById('myTitle').innerText = name;
        });

        socket.on('updateUserList', (list) => {
            const countEl = document.getElementById('userCount');
            if(countEl) countEl.innerText = list.length;
            const container = document.getElementById('userList');
            if(container) container.innerHTML = list.map(user => `<div class="user-badge">⚡ ${user}</div>`).join('');
        });

        function startQuiz() { socket.emit('startQuiz'); }
        function luckyDraw() { socket.emit('luckyDraw'); }

        socket.on('quizStarted', () => {
            document.getElementById('burstOverlay').classList.add('hidden');
            
            runCountdown(3, () => {
                document.getElementById('resultView').innerHTML = "⚡️ GO！向大力神杯冲刺！  ⚡️";
                
                const btn = document.getElementById('rushButton');
                const status = document.getElementById('statusText');
                if(btn && !isClientAdmin) {
                    btn.disabled = false;
                    btn.innerText = "RUSH!";
                    btn.classList.add('active');
                    status.className = "status-go";
                    status.innerText = "🔥 战道已开！速拍金键！！";
                }
            });
        });

        function runCountdown(seconds, callback) {
            const overlay = document.getElementById('countdownOverlay');
            const numEl = document.getElementById('countdownNumber');
            const adminBtn = document.getElementById('adminStartBtn');
            
            if(adminBtn) adminBtn.disabled = true; 
            overlay.classList.remove('hidden'); 
            
            let current = seconds;
            numEl.innerText = current;
            
            clearInterval(countdownTimer);
            countdownTimer = setInterval(() => {
                current--;
                if (current > 0) {
                    numEl.innerText = current;
                } else if (current === 0) {
                    numEl.innerText = "GO!";
                } else {
                    clearInterval(countdownTimer);
                    overlay.classList.add('hidden'); 
                    if(adminBtn) adminBtn.disabled = false; 
                    callback(); 
                }
            }, 1000);
        }

        socket.on('quizEnd', (winnerName) => {
            clearInterval(countdownTimer); 
            document.getElementById('countdownOverlay').classList.add('hidden');
            if(document.getElementById('adminStartBtn')) document.getElementById('adminStartBtn').disabled = false;

            document.getElementById('resultView').innerText = `🏆 本题得主：${winnerName} 成功捧杯！`;

            const burstBox = document.getElementById('burstOverlay');
            burstBox.innerHTML = `
                <div class="smoke-cloud"></div>
                <div class="burst-winner">🏆 绝杀：${winnerName} 夺得头筹！</div>
            `;
            burstBox.classList.remove('hidden');

            setTimeout(() => {
                burstBox.classList.add('hidden');
            }, 4500); 
            
            lockPlayerButton("已有人捷足先登，蓄力下一题...");
        });

        socket.on('drawResult', (luckyName) => {
            document.getElementById('resultView').innerHTML = `🎯 命运钦点：${luckyName} 请上前回答！`;

            const burstBox = document.getElementById('burstOverlay');
            burstBox.innerHTML = `
                <div class="smoke-cloud"></div>
                <div class="lucky-star">🎯 钦点回答：${luckyName}</div>
            `;
            burstBox.classList.remove('hidden');

            setTimeout(() => {
                burstBox.classList.add('hidden');
            }, 3000);
        });

        socket.on('invalidPress', () => {
            lockPlayerButton("抢跑无效！请等候发令！");
        });

        function lockPlayerButton(msg) {
            const btn = document.getElementById('rushButton');
            const status = document.getElementById('statusText');
            if(btn) {
                btn.disabled = true;
                btn.innerText = "READY";
                btn.classList.remove('active');
                status.className = "status-lock";
                status.innerText = "🔒 " + msg;
            }
        }
    </script>
</body>
</html>
