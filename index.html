<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>⚡🏆  MCE 大力神杯系列赛 - 竞速抢答 🏆⚡</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    
    <style>
        /* 🎨 全局赛博朋克电竞风与运动主题结合 */
        :root {
            --bg-color: #0a0a16;
            --primary-color: #ff007f;
            --secondary-color: #00f0ff;
            --success-color: #39ff14;
            --warning-color: #ffaa00;
            --panel-bg: rgba(20, 20, 45, 0.7);
            --gold-color: #FFD700; /* 金黄色 */
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: "Microsoft YaHei", "微软雅黑", -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            /* 🍀 修正：背景调整为世界杯草坪（使用渐变和图案模拟） */
            background-image: 
                radial-gradient(circle at center, rgba(27, 17, 58, 0.5) 0%, rgba(10, 10, 22, 0.8) 100%),
                repeating-linear-gradient(0deg, transparent, transparent 50px, rgba(255, 255, 255, 0.03) 50px, rgba(255, 255, 255, 0.03) 100px),
                repeating-linear-gradient(90deg, #1e5631 0px, #1e5631 2px, #2d814c 2px, #2d814c 100px); /* 模拟草坪条纹 */
            background-blend-mode: overlay, normal, normal;
            background-attachment: fixed;
            color: #fff; 
            text-align: center; 
            margin: 0; 
            padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom) 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .container { max-width: 800px; margin: 0 auto; width: 100%; position: relative; z-index: 2; }
        
        /* 🏆 🚀 修正：微软雅黑、加粗、金黄色、荧光闪动 */
        .top-event-title {
            font-family: "Microsoft YaHei", "微软雅黑", sans-serif;
            font-size: 2.8rem; 
            font-weight: bold; /* 加粗 */
            color: var(--gold-color); /* 金黄色 */
            letter-spacing: 2px;
            margin: 0;
            padding: 0 10px;
            line-height: 1.2;
            text-transform: uppercase;
            /* 🌟 荧光闪动效果 */
            animation: gold-glow-flicker 2s infinite alternate;
        }

        h1 { 
            font-size: 2.1rem; 
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-top: 10px;
            margin-bottom: 5px;
            filter: drop-shadow(0 2px 12px rgba(255,0,127,0.4));
            animation: neon-flicker 2s infinite alternate;
        }

        /* 📍 副标题 */
        .sub-title {
            font-size: 1.2rem;
            color: var(--cyan-glow);
            font-weight: bold;
            letter-spacing: 2px;
            margin-top: 5px;
            margin-bottom: 25px;
            text-shadow: 0 0 8px rgba(0, 240, 255, 0.6);
        }

        /* 🏆 结果公告栏优化 */
        #resultView { 
            font-size: 1.5rem; 
            color: #fff; 
            font-weight: bold; 
            margin: 15px auto; 
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            min-height: 55px; 
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        /* 📱 员工端：签到输入框与按钮 */
        .glass-panel {
            background: var(--panel-bg);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 24px;
            padding: 35px 25px;
            box-shadow: 0 10px 30px rgba(0, 240, 255, 0.1);
            backdrop-filter: blur(20px);
        }

        input { 
            padding: 16px 20px; 
            font-size: 1.1rem; 
            border-radius: 16px; 
            border: 2px solid rgba(255, 255, 255, 0.1); 
            width: 100%; 
            max-width: 320px; 
            text-align: center; 
            background: rgba(0, 0, 0, 0.4); 
            color: #fff; 
            outline: none; 
            transition: 0.3s;
            margin-bottom: 20px;
        }
        input:focus { 
            border-color: var(--secondary-color); 
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
        }

        .action-btn { 
            background: linear-gradient(135deg, var(--primary-color) 0%, #b0005d 100%); 
            color: white; 
            border: none; 
            padding: 16px 40px; 
            font-size: 1.2rem; 
            font-weight: bold;
            border-radius: 16px; 
            cursor: pointer; 
            transition: 0.2s; 
            box-shadow: 0 6px 20px rgba(255, 0, 127, 0.4);
            width: 100%;
            max-width: 320px;
        }
        .action-btn:active { transform: scale(0.96); box-shadow: 0 2px 10px rgba(255, 0, 127, 0.2); }

        /* 🚨 员工端：状态提示条 */
        #statusText { 
            font-size: 1.1rem; 
            font-weight: bold; 
            padding: 12px; 
            border-radius: 12px; 
            margin: 15px auto;
            max-width: 340px;
            transition: 0.3s;
        }
        .status-lock { color: var(--warning-color); background: rgba(255, 170, 0, 0.1); border: 1px solid rgba(255, 170, 0, 0.2); }
        .status-go { color: var(--success-color); background: rgba(57, 255, 20, 0.1); border: 1px solid rgba(57, 255, 20, 0.3); animation: breath 1s infinite alternate; }

        /* 🔘 员工端：超炫赛博“足球”抢答大按钮 */
        #rushButton { 
            width: 240px; 
            height: 240px; 
            border-radius: 50%; 
            font-size: 2.2rem; 
            font-weight: 950;
            /* ⚽ 足球经典皮革网格纹路 */
            background: 
                radial-gradient(circle at center, rgba(255,255,255,0.15) 0%, rgba(0,0,0,0.5) 100%),
                repeating-linear-gradient(45deg, rgba(255,255,255,0.05) 0px, rgba(255,255,255,0.05) 2px, transparent 2px, transparent 40px),
                repeating-linear-gradient(-45deg, rgba(255,255,255,0.05) 0px, rgba(255,255,255,0.05) 2px, transparent 2px, transparent 40px),
                #1a1a2e;
            color: #444455; 
            box-shadow: 0 12px 0 #080812, inset 0 6px 15px rgba(255,255,255,0.1), 0 15px 25px rgba(0,0,0,0.6); 
            margin: 30px auto; 
            display: flex;
            align-items: center;
            justify-content: center;
            border: 8px solid #28283d; 
            transition: all 0.12s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            cursor: not-allowed;
            position: relative;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }
        
        /* ⚽ 足球激活状态：通体炸裂变红 */
        #rushButton.active { 
            background: 
                radial-gradient(circle at center, rgba(255,255,255,0.2) 0%, rgba(0,0,0,0.4) 100%),
                repeating-linear-gradient(45deg, rgba(255,240,245,0.1) 0px, rgba(255,240,245,0.1) 2px, transparent 2px, transparent 40px),
                repeating-linear-gradient(-45deg, rgba(255,240,245,0.1) 0px, rgba(255,240,245,0.1) 2px, transparent 2px, transparent 40px),
                #ff2a6d; 
            color: white; 
            box-shadow: 0 12px 0 #5a001e, 0 0 50px rgba(255, 42, 109, 0.8); 
            border: 8px solid #ff6596; 
            cursor: pointer; 
            animation: pulse 0.6s infinite alternate, shake 0.08s infinite;
        }
        #rushButton:active:not(:disabled) {
            transform: translateY(10px);
            box-shadow: 0 2px 0 #5a001e, 0 0 25px rgba(255, 42, 109, 0.5);
        }

        /* ⏳ 综艺感3秒倒计时遮罩层 */
        #countdownOverlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 15, 35, 0.97); 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            z-index: 999; 
        }
        #countdownNumber { 
            font-size: 13rem; font-weight: 900; color: var(--cyan-glow); 
            text-shadow: 0 0 50px rgba(0, 240, 255, 0.8); 
            animation: popIn 0.5s ease-out infinite alternate; 
        }
        #countdownTips { font-size: 2rem; color: var(--gold-winner); font-weight: bold; margin-bottom: 20px; letter-spacing: 4px; text-shadow: 0 0 12px rgba(255,215,0,0.4); }

        /* 💻 主持人大屏控制台样式（保持硬朗排版） */
        .dashboard { display: flex; justify-content: space-around; align-items: flex-start; margin-top: 10px; flex-wrap: wrap; gap: 20px; text-align: left; }
        .panel { background: var(--panel-bg); padding: 25px; border-radius: 20px; border: 1px solid rgba(0, 102, 204, 0.3); flex: 1; min-width: 300px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #qrcode { background: white; padding: 12px; display: inline-block; border-radius: 12px; margin-top: 10px; box-shadow: 0 0 20px rgba(255,255,255,0.1); }
        .user-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px; max-height: 250px; overflow-y: auto; padding-right: 5px; }
        .user-badge { background: rgba(0, 102, 204, 0.15); padding: 8px 16px; border-radius: 30px; border: 1px solid var(--roche-blue); font-size: 0.95rem; display: flex; align-items: center; }
        .admin-action-btn { background: linear-gradient(135deg, #00FF66 0%, #009933 100%); width: auto; max-width: none; border: none; font-size: 1.2rem; color: #001122; box-shadow: 0 4px 20px rgba(0,255,100,0.3); margin-bottom: 15px; }

        /* 🎬 特效动画 */
        /* 🌟 修正：金黄色荧光闪动动画 */
        @keyframes gold-glow-flicker {
            0%, 100% { text-shadow: 0 0 10px rgba(255, 215, 0, 0.7), 0 0 20px rgba(255, 215, 0, 0.5), 0 0 30px rgba(255, 215, 0, 0.3); opacity: 1; }
            50% { text-shadow: 0 0 15px rgba(255, 215, 0, 0.9), 0 0 30px rgba(255, 215, 0, 0.7), 0 0 45px rgba(255, 215, 0, 0.5); opacity: 0.9; }
        }
        @keyframes neon-flicker {
            0%, 100% { filter: drop-shadow(0 2px 12px rgba(255,0,127,0.5)); opacity: 1; }
            95% { filter: drop-shadow(0 2px 12px rgba(255,0,127,0.5)); opacity: 1; }
            96% { opacity: 0.85; filter: drop-shadow(0 2px 4px rgba(255,0,127,0.2)); }
            97% { opacity: 1; }
            98% { opacity: 0.9; }
            99% { opacity: 1; }
        }
        @keyframes pulse { 0% { box-shadow: 0 12px 0 #5a001e, 0 0 30px rgba(255, 42, 109, 0.5); } 100% { box-shadow: 0 12px 0 #5a001e, 0 0 60px rgba(255, 42, 109, 0.9); } }
        @keyframes breath { 0% { opacity: 0.6; } 100% { opacity: 1; } }
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0.5; } 100% { transform: scale(1.1); opacity: 1; } }
        @keyframes shake { 0% { transform: translate(0, 0); } 50% { transform: translate(-1px, 1px); } 100% { transform: translate(1px, -1px); } }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="countdownOverlay" class="hidden">
        <div id="countdownTips">🏆 大力神杯系列赛 - 预备 🏆</div>
        <div id="countdownNumber">3</div>
    </div>

    <div class="container">
        <!-- 🏆 🚀 修正：微软雅黑、加粗、金黄色、荧光闪动 -->
        <div class="top-event-title">MCE 大力神杯系列赛事</div>
        
        <!-- ⚡ 霓虹流光闪烁大标题 -->
        <h1 id="mainTitle">⚡ SPEED RUSH ⚡</h1>
        
        <div id="resultView">🏆 MCE 大力神杯系列赛 - 竞速抢答 </div>

        <div id="loginView" class="hidden glass-panel">
            <input type="text" id="usernameInput" placeholder="请输入您所属赛事区域（如：北一区）" autocomplete="off"><br>
            <button class="action-btn" onclick="register()">锁定身份 ➡️ 入场</button>
        </div>

        <div id="playerView" class="hidden">
            <p style="font-size: 1.1rem; color: #aaa; margin: 5px 0;">当前身份：<span id="myTitle" style="color:var(--cyan-glow); font-weight: 900;"></span></p>
            <div id="statusText" class="status-lock">🔒 请听主持人宣读题目...</div>
            <!-- ⚽ 拟真足球形式抢答按键 -->
            <button id="rushButton" disabled onclick="pressButton()">READY</button>
        </div>

        <div id="adminView" class="dashboard hidden">
            <div class="panel">
                <h3 style="color: var(--cyan-glow); margin-top: 0; font-size: 1.2rem;">📢 赛事集结专属二维码</h3>
                <div id="qrcode"></div>
                <h4 style="margin-top: 20px; margin-bottom: 10px; color: #aaa;">已就位选手 (<span id="userCount" style="color:var(--gold-winner); font-weight: bold;">0</span> 人)：</h4>
                <div class="user-list" id="userList"></div>
            </div>
            
            <div class="panel" style="display: flex; flex-direction: column; justify-content: center;">
                <h3 style="color: var(--gold-winner); margin-top: 0; font-size: 1.2rem;">⚙️ MCE 赛事中控台</h3>
                <button id="adminStartBtn" class="action-btn admin-action-btn" onclick="startQuiz()" style="background: linear-gradient(135deg, #00FF66 0%, #009933 100%); box-shadow: 0 4px 20px rgba(0,255,100,0.3); font-size: 1.2rem; color: #001122;">🔥 启动极速抢答（3秒倒计）</button>
                <button class="action-btn admin-action-btn" onclick="luckyDraw()">🎯 随机点将回答啦！ </button>
                <p style="color: #666; font-size: 0.85rem; margin-top: 15px; line-height: 1.5; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px;">
                    💡 <b>完美控场流程：</b><br>
                    当您点按【开启】后，所有人的手机会立刻强制黑屏并闪烁 3, 2, 1！数到 0 的瞬间，员工手机按钮会自动“炸裂变红并疯狂抖动”，最完美的公平对决！
                </p>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let myName = "";
        let isClientAdmin = false;
        let countdownTimer = null;

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            isClientAdmin = urlParams.get('role') === 'admin';

            if (isClientAdmin) {
                document.getElementById('adminView').classList.remove('hidden');
                document.getElementById('mainTitle').innerText = "SPEED RUSH";
                // 修正：管理员端标题调整
                document.querySelector('.top-event-title').innerText = "💻 MCE COMMAND PANEL";
                
                let staffUrl = window.location.origin + window.location.pathname;
                new QRCode(document.getElementById("qrcode"), {
                    text: staffUrl,
                    width: 180,
                    height: 180,
                    colorDark : "#000000",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.H
                });
            } else {
                document.getElementById('loginView').classList.remove('hidden');
                document.getElementById('adminView').remove(); 
            }
        };

        function register() {
            const name = document.getElementById('usernameInput').value.trim();
            if(!name) return alert('请输入您所属参赛区域哦！');
            myName = name;
            socket.emit('register', name);
        }

        function pressButton() { socket.emit('pressButton'); }

        socket.on('registered', (name) => {
            document.getElementById('loginView').classList.add('hidden');
            document.getElementById('playerView').classList.remove('hidden');
            document.getElementById('myTitle').innerText = name;
        });

        socket.on('updateUserList', (list) => {
            const countEl = document.getElementById('userCount');
            if(countEl) countEl.innerText = list.length;
            const container = document.getElementById('userList');
            if(container) container.innerHTML = list.map(user => `<div class="user-badge">🔬 ${user}</div>`).join('');
        });

        function startQuiz() { socket.emit('startQuiz'); }
        function luckyDraw() { socket.emit('luckyDraw'); }

        socket.on('quizStarted', () => {
            runCountdown(3, () => {
                document.getElementById('resultView').innerText = "⚡️ GO！向大力神杯冲刺！  ⚡️";
                
                const btn = document.getElementById('rushButton');
                const status = document.getElementById('statusText');
                if(btn && !isClientAdmin) {
                    btn.disabled = false;
                    btn.innerText = "RUSH!";
                    btn.classList.add('active');
                    status.className = "status-go";
                    status.innerText = "🔥 大杯已开！速拍金键！！";
                }
            });
        });

        function runCountdown(seconds, callback) {
            const overlay = document.getElementById('countdownOverlay');
            const numEl = document.getElementById('countdownNumber');
            const adminBtn = document.getElementById('adminStartBtn');
            
            if(adminBtn) adminBtn.disabled = true; 
            overlay.classList.remove('hidden'); 
            
            let current = seconds;
            numEl.innerText = current;
            numEl.style.color = "var(--cyan-glow)";
            
            clearInterval(countdownTimer);
            countdownTimer = setInterval(() => {
                current--;
                if (current > 0) {
                    numEl.innerText = current;
                } else if (current === 0) {
                    numEl.innerText = "GO!";
                    numEl.style.color = "var(--gold-winner)";
                } else {
                    clearInterval(countdownTimer);
                    overlay.classList.add('hidden'); 
                    if(adminBtn) adminBtn.disabled = false; 
                    callback(); 
                }
            }, 1000);
        }

        socket.on('quizEnd', (winnerName) => {
            clearInterval(countdownTimer); 
            document.getElementById('countdownOverlay').classList.add('hidden');
            if(document.getElementById('adminStartBtn')) document.getElementById('adminStartBtn').disabled = false;

            document.getElementById('resultView').innerText = `🏆 本题得得主：【${winnerName}】 成功捧杯！`;
            lockPlayerButton("已有人捷足先登，蓄力下一题...");
        });

        socket.on('drawResult', (luckyName) => {
            document.getElementById('resultView').innerText = `🎯 命运钦点：【${luckyName}】 请上前回答！`;
        });

        socket.on('invalidPress', () => {
            lockPlayerButton("抢跑无效！请等候发令！");
        });

        function lockPlayerButton(msg) {
            const btn = document.getElementById('rushButton');
            const status = document.getElementById('statusText');
            if(btn) {
                btn.disabled = true;
                btn.innerText = "READY";
                btn.classList.remove('active');
                status.className = "status-lock";
                status.innerText = "🔒 " + msg;
            }
        }
    </script>
</body>
</html>
