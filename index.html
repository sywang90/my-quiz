<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>罗氏MCE大力神杯竞赛</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        /* 🎨 罗氏官方蓝白 x 荣耀金电竞风 */
        :root {
            --roche-blue: #0066CC;       /* 罗氏经典蓝 */
            --roche-dark: #002244;       /* 深海商务蓝 */
            --roche-light: #F4F8FC;      /* 纯净科技白 bg */
            --cyan-glow: #00F0FF;        /* 炫酷荧光蓝 */
            --gold-winner: #FFD700;      /* 大力神杯荣耀金 */
            --panel-bg: rgba(0, 34, 68, 0.85);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at center, var(--roche-dark) 0%, #000b18 100%); 
            color: #fff; 
            text-align: center; 
            margin: 0; 
            padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom) 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .container { max-width: 850px; margin: 0 auto; width: 100%; position: relative; z-index: 2; }
        
        /* 🏆 顶部罗氏MCE大力神杯布局（含奖杯） */
        .header-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 5px;
        }

        /* 炫酷黄金奖杯图标 CSS 拟真绘制 */
        .trophy-icon {
            width: 45px;
            height: 55px;
            background: linear-gradient(45deg, #FFD700, #FFA500, #FFFACD, #FFD700);
            clip-path: polygon(20% 0%, 80% 0%, 90% 20%, 70% 50%, 80% 85%, 50% 100%, 20% 85%, 30% 50%, 10% 20%);
            filter: drop-shadow(0 0 12px rgba(255, 215, 0, 0.8));
            animation: trophy-glow 1.5s infinite alternate;
            flex-shrink: 0;
        }

        h1 { 
            font-size: 1.9rem; 
            font-weight: 900;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #FFF 30%, var(--cyan-glow) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            text-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
            text-align: left;
        }

        /* 📍 副标题：请参赛者们入场签到 */
        .sub-title {
            font-size: 1.2rem;
            color: var(--cyan-glow);
            font-weight: bold;
            letter-spacing: 2px;
            margin-top: 5px;
            margin-bottom: 25px;
            text-shadow: 0 0 8px rgba(0, 240, 255, 0.6);
            animation: pulse-text 2s infinite;
        }

        /* 🏆 结果公告栏 */
        #resultView { 
            font-size: 1.4rem; 
            color: #fff; 
            font-weight: bold; 
            margin: 15px auto; 
            padding: 12px 20px;
            background: rgba(0, 102, 204, 0.2);
            border-radius: 16px;
            border: 1px solid rgba(0, 240, 255, 0.3);
            min-height: 55px; 
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0, 102, 204, 0.2);
        }

        /* 📱 登录面板 */
        .glass-panel {
            background: var(--panel-bg);
            border: 2px solid rgba(0, 102, 204, 0.4);
            border-radius: 24px;
            padding: 35px 25px;
            box-shadow: 0 15px 35px rgba(0, 102, 204, 0.3);
            backdrop-filter: blur(20px);
        }

        input { 
            padding: 16px 20px; 
            font-size: 1.1rem; 
            border-radius: 14px; 
            border: 2px solid rgba(0, 102, 204, 0.3); 
            width: 100%; 
            max-width: 320px; 
            text-align: center; 
            background: rgba(0, 0, 0, 0.5); 
            color: #fff; 
            outline: none; 
            transition: 0.3s;
            margin-bottom: 25px;
        }
        input:focus { 
            border-color: var(--cyan-glow); 
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.5);
        }

        .action-btn { 
            background: linear-gradient(135deg, var(--roche-blue) 0%, #004499 100%); 
            color: white; 
            border: 1px solid var(--cyan-glow);
            padding: 16px 40px; 
            font-size: 1.2rem; 
            font-weight: bold;
            border-radius: 14px; 
            cursor: pointer; 
            transition: 0.2s; 
            box-shadow: 0 6px 20px rgba(0, 102, 204, 0.4);
            width: 100%;
            max-width: 320px;
            letter-spacing: 1px;
        }
        .action-btn:active { transform: scale(0.96); box-shadow: 0 2px 10px rgba(0, 102, 204, 0.2); }

        /* 🚨 状态提示条 */
        #statusText { 
            font-size: 1.1rem; 
            font-weight: bold; 
            padding: 12px; 
            border-radius: 12px; 
            margin: 15px auto;
            max-width: 340px;
        }
        .status-lock { color: #aaa; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
        .status-go { color: var(--gold-winner); background: rgba(255, 215, 0, 0.1); border: 1px solid rgba(255, 215, 0, 0.4); animation: breath 1s infinite alternate; }

        /* 🔘 罗氏精英抢答键 */
        #rushButton { 
            width: 230px; 
            height: 230px; 
            border-radius: 50%; 
            font-size: 2.2rem; 
            font-weight: 900;
            background: radial-gradient(circle at center, #112244 0%, #001122 100%); 
            color: rgba(255,255,255,0.2); 
            box-shadow: 0 10px 0 #000818, inset 0 4px 10px rgba(255,255,255,0.05); 
            margin: 35px auto; 
            display: flex;
            align-items: center;
            justify-content: center;
            border: 6px solid #1a3366; 
            transition: all 0.12s ease-out; 
            cursor: not-allowed;
        }
        /* 激活状态：瞬间爆燃变金黄色（捧杯时刻） */
        #rushButton.active { 
            background: radial-gradient(circle at center, #FFD700 0%, #CC9900 100%); 
            color: #002244; 
            box-shadow: 0 10px 0 #886600, 0 0 45px rgba(255, 215, 0, 0.7); 
            border: 6px solid #FFFACD; 
            cursor: pointer; 
            animation: shake 0.1s infinite;
        }
        #rushButton:active:not(:disabled) {
            transform: translateY(8px);
            box-shadow: 0 2px 0 #886600, 0 0 20px rgba(255, 215, 0, 0.5);
        }

        /* ⏳ 3秒全屏倒计时 */
        #countdownOverlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 15, 35, 0.97); 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            z-index: 999; 
        }
        #countdownNumber { 
            font-size: 13rem; font-weight: 900; color: var(--cyan-glow); 
            text-shadow: 0 0 50px rgba(0, 240, 255, 0.8); 
            animation: popIn 0.5s ease-out infinite alternate; 
        }
        #countdownTips { font-size: 2rem; color: var(--gold-winner); font-weight: bold; margin-bottom: 20px; letter-spacing: 4px; text-shadow: 0 0 12px rgba(255,215,0,0.4); }

        /* 💻 主持人控制台（经典硬朗排版） */
        .dashboard { display: flex; justify-content: space-around; align-items: flex-start; margin-top: 10px; flex-wrap: wrap; gap: 20px; text-align: left; }
        .panel { background: var(--panel-bg); padding: 25px; border-radius: 20px; border: 1px solid rgba(0, 102, 204, 0.3); flex: 1; min-width: 300px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #qrcode { background: white; padding: 12px; display: inline-block; border-radius: 12px; margin-top: 10px; }
        .user-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px; max-height: 250px; overflow-y: auto; }
        .user-badge { background: rgba(0, 102, 204, 0.15); padding: 8px 16px; border-radius: 30px; border: 1px solid var(--roche-blue); font-size: 0.95rem; }
        .admin-action-btn { background: linear-gradient(135deg, #00FFcc 0%, #0099ff 100%); width: auto; max-width: none; border: none; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,255,200,0.2); }

        /* 🎬 特效动画 */
        @keyframes trophy-glow { 0% { transform: scale(0.95); filter: drop-shadow(0 0 8px rgba(255,215,0,0.6)); } 100% { transform: scale(1.05); filter: drop-shadow(0 0 18px rgba(255,215,0,0.9)); } }
        @keyframes pulse-text { 0%, 100% { opacity: 0.8; } 50% { opacity: 1; filter: brightness(1.2); } }
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0.5; } 100% { transform: scale(1.1); opacity: 1; } }
        @keyframes shake { 0% { transform: translate(0, 0); } 50% { transform: translate(-1px, 1px); } 100% { transform: translate(1px, -1px); } }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="countdownOverlay" class="hidden">
        <div id="countdownTips">🏆 大力神杯系列赛 - 预备 🏆</div>
        <div id="countdownNumber">3</div>
    </div>

    <div class="container">
        <div class="header-wrapper">
            <div class="trophy-icon"></div>
            <h1>罗氏MCE大力神杯竞赛</h1>
        </div>
        <div class="sub-title">請參賽者們入場簽到</div>

        <div id="resultView">💎 卓越医疗，手速加冕</div>

        <div id="loginView" class="hidden glass-panel">
            <input type="text" id="usernameInput" placeholder="请输入您的代号（如：张三 - 销售部）" autocomplete="off"><br>
            <button class="action-btn" onclick="register()">锁定代号 ➡️ 进场</button>
        </div>

        <div id="playerView" class="hidden">
            <p style="font-size: 1.1rem; color: #aaa; margin: 5px 0;">当前选手：<span id="myTitle" style="color:var(--cyan-glow); font-weight: 900;"></span></p>
            <div id="statusText" class="status-lock">🔒 请听主持人宣读题目...</div>
            <button id="rushButton" disabled onclick="pressButton()">READY</button>
        </div>

        <div id="adminView" class="dashboard hidden">
            <div class="panel">
                <h3 style="color: var(--cyan-glow); margin-top: 0; font-size: 1.1rem;">📱 赛事集结专属二维码</h3>
                <div id="qrcode"></div>
                <h4 style="margin-top: 20px; margin-bottom: 10px; color: #aaa;">已就位选手 (<span id="userCount" style="color:var(--gold-winner); font-weight: bold;">0</span> 人)：</h4>
                <div class="user-list" id="userList"></div>
            </div>
            
            <div class="panel" style="display: flex; flex-direction: column; justify-content: center;">
                <h3 style="color: var(--gold-winner); margin-top: 0; font-size: 1.1rem;">⚙️ 罗氏中央赛事控制台</h3>
                <button id="adminStartBtn" class="action-btn admin-action-btn" onclick="startQuiz()" style="background: linear-gradient(135deg, #00FF66 0%, #009933 100%); box-shadow: 0 4px 20px rgba(0,255,100,0.3); font-size: 1.2rem; color: #001122;">🔥 启动极速抢答（3秒倒计时）</button>
                <button class="action-btn admin-action-btn" onclick="luckyDraw()" style="background: linear-gradient(135deg, #0066CC 0%, #002244 100%);">🎯 随机点将回答</button>
                <p style="color: #666; font-size: 0.85rem; margin-top: 15px; line-height: 1.5; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px;">
                    💡 <b>蓝白竞技控场指引：</b><br>
                    读完题点击【启动】后，全员手机屏幕会被瞬间锁定，高燃闪烁 3, 2, 1！数到 0 的瞬间，员工端按钮自动炸裂烫金并震颤，点爆全场！
                </p>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let myName = "";
        let isClientAdmin = false;
        let countdownTimer = null;

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            isClientAdmin = urlParams.get('role') === 'admin';

            if (isClientAdmin) {
                document.getElementById('adminView').classList.remove('hidden');
                document.getElementById('mainTitle').innerText = "💻 ROCHE MCE COMMAND (中枢大屏)";
                
                let staffUrl = window.location.origin + window.location.pathname;
                new QRCode(document.getElementById("qrcode"), {
                    text: staffUrl,
                    width: 180,
                    height: 180,
                    colorDark : "#000000",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.H
                });
            } else {
                document.getElementById('loginView').classList.remove('hidden');
                document.getElementById('adminView').remove(); 
            }
        };

        function register() {
            const name = document.getElementById('usernameInput').value.trim();
            if(!name) return alert('请输入您的名字参加挑战！');
            myName = name;
            socket.emit('register', name);
        }

        socket.on('registered', (name) => {
            document.getElementById('loginView').classList.add('hidden');
            document.getElementById('playerView').classList.remove('hidden');
            document.getElementById('myTitle').innerText = name;
        });

        socket.on('updateUserList', (list) => {
            const countEl = document.getElementById('userCount');
            if(countEl) countEl.innerText = list.length;
            const container = document.getElementById('userList');
            if(container) container.innerHTML = list.map(user => `<div class="user-badge">🔬 ${user}</div>`).join('');
        });

        function startQuiz() { socket.emit('startQuiz'); }
        function luckyDraw() { socket.emit('luckyDraw'); }

        socket.on('quizStarted', () => {
            runCountdown(3, () => {
                document.getElementById('resultView').innerText = "⚡️ GO！向大力神杯冲刺！ ⚡️";
                
                const btn = document.getElementById('rushButton');
                const status = document.getElementById('statusText');
                if(btn && !isClientAdmin) {
                    btn.disabled = false;
                    btn.innerText = "RUSH";
                    btn.classList.add('active');
                    status.className = "status-go";
                    status.innerText = "🔥 大杯已开！速拍金键！！";
                }
            });
        });

        function runCountdown(seconds, callback) {
            const overlay = document.getElementById('countdownOverlay');
            const numEl = document.getElementById('countdownNumber');
            const adminBtn = document.getElementById('adminStartBtn');
            
            if(adminBtn) adminBtn.disabled = true; 
            overlay.classList.remove('hidden'); 
            
            let current = seconds;
            numEl.innerText = current;
            numEl.style.color = "var(--cyan-glow)";
            
            clearInterval(countdownTimer);
            countdownTimer = setInterval(() => {
                current--;
                if (current > 0) {
                    numEl.innerText = current;
                } else if (current === 0) {
                    numEl.innerText = "GO!";
                    numEl.style.color = "var(--gold-winner)";
                } else {
                    clearInterval(countdownTimer);
                    overlay.classList.add('hidden'); 
                    if(adminBtn) adminBtn.disabled = false; 
                    callback(); 
                }
            }, 1000);
        }

        function pressButton() { socket.emit('pressButton'); }

        socket.on('quizEnd', (winnerName) => {
            clearInterval(countdownTimer); 
            document.getElementById('countdownOverlay').classList.add('hidden');
            if(document.getElementById('adminStartBtn')) document.getElementById('adminStartBtn').disabled = false;

            document.getElementById('resultView').innerText = `🏆 本题得主：【${winnerName}】 成功夺位！`;
            lockPlayerButton("已有人捷足先登，等待下一轮...");
        });

        socket.on('drawResult', (luckyName) => {
            document.getElementById('resultView').innerText = `🎯 命运钦点：【${luckyName}】 连线回答！`;
        });

        socket.on('invalidPress', () => {
            lockPlayerButton("违规抢跑！等候指令！");
        });

        function lockPlayerButton(msg) {
            const btn = document.getElementById('rushButton');
            const status = document.getElementById('statusText');
            if(btn) {
                btn.disabled = true;
                btn.innerText = "READY";
                btn.classList.remove('active');
                status.className = "status-lock";
                status.innerText = "🔒 " + msg;
            }
        }
    </script>
</body>
</html>
